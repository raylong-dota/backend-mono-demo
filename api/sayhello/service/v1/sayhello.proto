syntax = "proto3";

package sayhello.v1;

import "google/api/annotations.proto";

option go_package = "api/sayhello/service/v1;v1";

// The greeting service definition.
service Sayhello {
  // Sends a greeting
  rpc SayHello (SayhelloRequest) returns (SayhelloReply) {
    option (google.api.http) = {
      get: "/sayhello/{name}"
    };
  }
  // Proxies a greeting request to the helloworld service via gRPC
  rpc HelloProxy (HelloProxyRequest) returns (HelloProxyReply) {
    option (google.api.http) = {
      get: "/hello/{name}"
    };
  }
}

// The request message containing the user's name.
message SayhelloRequest {
  string name = 1;
}

// The response message containing the greetings
message SayhelloReply {
  string message = 1;
}

message HelloProxyRequest {
  string name = 1;
}

message HelloProxyReply {
  string message = 1;
}
